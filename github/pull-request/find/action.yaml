name: 'Find GitHub pull request'

description: 'Action to find a GitHub pull request'

inputs:
  branch:
    description: 'Branch name'
    required: true
    type: string

outputs:
  number:
    description: "Pull request number"
    value: ${{ steps.find-pull-request.outputs.number }}

runs:
  using: "composite"

  steps:
    - name: ⤴️ Find GitHub pull request
      id: find-pull-request
      uses: juliangruber/find-pull-request-action@92b38d91ef26fd0f47374257f50e78432359a45f # v1.11.1
      with:
        branch: ${{ inputs.branch }}
