name: Auto Approve PR

on: pull_request

jobs:
  auto-approve:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: ✅ Auto Approve
        uses: JavierSegoviaCordoba/Actions/github/pull-request/auto-approve@d0a64af41abdf5de0f2e8606149c5f25404522d0 # main
        with:
          github-token: '${{ secrets.TOKEN_GITHUB_ACTION }}'
