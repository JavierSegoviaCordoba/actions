name: Auto Approve PR

on: pull_request

jobs:
  auto-approve:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: ✅ Auto Approve
        uses: JavierSegoviaCordoba/Actions/github/pull-request/auto-approve@1091ece2d79a429b9dbc5d5a1ac2ea8a0a53b50c # main
        with:
          github-token: '${{ secrets.TOKEN_GITHUB_ACTION }}'
